<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Tia, traz refri 😭</title>
    <style>
        body {
            background-color: #111;

            font-family: Arial, sans-serif;
            text-align: center;
            padding-top: 100px;
        }
        h1 {
            font-size: 40px;
        }
        p {
            font-size: 22px;

        button {

            font-size: 18px;

            color: white;

        }
    </style>
</head>
<body>

    <h1>🥺 Tia...</h1>
    <p>se você me ama mesmo...</p>
    <p><strong>TRAZ UM REFRI PRA MIM 😭🙏</strong></p>

    <button onclick="resposta()">Clicar aqui tia 👀</button>

    <p id="resposta"></p>

    <script>
        function resposta() {
            document.getElementById("resposta").innerHTML = "💖 Sabia que você era a melhor tia do mundo 💖";
        }
    </script>

</body>
</html>
